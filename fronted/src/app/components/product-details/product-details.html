<div class="details-container" [appHoverGlow]="'rgba(16, 185, 129, 0.2)'" glowBorderColor="#10b981">
  <button class="back-btn" (click)="goBack()">← Back to Products</button>

  @if (product) {
    <div class="product-card">
      <div class="product-header-inline">
        <h1 [attr.title]="product.name" [style.color]="'#0f172a'">{{ product.name | shortText:10 }}</h1>
        <span [ngClass]="{'premium-badge': product.price > 100, 'regular-badge': product.price <= 100}"
              [ngStyle]="{'font-weight': '600', 'letter-spacing': '0.05em'}">
          {{ product.price > 100 ? 'Premium' : 'Standard' }}
        </span>
      </div>

      <p class="desc">{{ product.description  | shortText:50 }}</p>

      <div class="price-box">
        <span class="original-price">Original: ${{ product.price.toFixed(2) }}</span>
      </div>

      <div class="actions">
        <button [disabled]="product.price <= 0" class="buy-btn" (click)="addToCart()">Add to Cart</button>
        <button class="edit-btn" [routerLink]="['/product-form', product.id]">Edit Details</button>
        <button class="delete-btn" (click)="deleteProduct()">Delete Product</button>
      </div>
    </div>
  }

  <div *appUnless="product !== null" class="not-found-card">
    <p>We couldn't retrieve the details for this product.</p>
    <button class="back-btn" (click)="goBack()">Return to Listing</button>
  </div>
</div>
