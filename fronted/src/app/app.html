<header class="app-header">
  <div class="header-container">
    <a routerLink="/" class="logo">E-Shop</a>
    <nav class="nav-menu">
      <a routerLink="/products" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Browse Products</a>
      <a routerLink="/product-form/new" routerLinkActive="active" class="btn-new-nav">+ Add Product</a>
    </nav>
  </div>
</header>

<!-- Loader Overlay till Resolver Replies -->
@if (loading()) {
  <div class="resolver-loading-overlay">
    <div class="spinner-box">
      <div class="spinner"></div>
      <span>Fetching data...</span>
    </div>
  </div>
}

<main class="app-main">
  <div class="app-wrapper">
    <section class="catalog-section">
      <router-outlet></router-outlet>
    </section>
    <aside class="cart-section">
      <app-cart-sidebar></app-cart-sidebar>
    </aside>
  </div>
</main>
